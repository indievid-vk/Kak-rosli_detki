<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Как росли детки</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#f97316"/>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Детский Дневник">

    <link rel="manifest" href="/manifest.json?v=110">
    <link rel="icon" type="image/png" href="/icon-512.png?v=110">
    <!-- Use apple icon as default png since it's already generated well -->
    <link rel="apple-touch-icon" href="/apple-icon.png?v=110">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon.png?v=110">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon.png?v=110">
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-icon.png?v=110">
    
    <script>
      // Global error handler for chunk loading errors to prevent white screens
      window.addEventListener('error', (e) => {
        // If offline, don't try to reload as it might break things further
        if (!navigator.onLine) return;

        const msg = e.message || '';
        if (msg.includes('Loading chunk') || msg.includes('Script error') || msg.includes("Unexpected token '<'") || msg.includes('Unexpected token')) {
          const lastReload = localStorage.getItem('pwa_last_error_reload');
          const now = Date.now();
          if (!lastReload || (now - parseInt(lastReload) > 5000)) {
            localStorage.setItem('pwa_last_error_reload', now.toString());
            
            // Try to unregister service workers and clear caches before reloading
            if ('caches' in window) {
              caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
              });
            }
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                  registration.unregister();
                }
                setTimeout(() => window.location.reload(true), 100);
              }).catch(() => {
                setTimeout(() => window.location.reload(true), 100);
              });
            } else {
              setTimeout(() => window.location.reload(true), 100);
            }
          }
        }
      }, true);

      // Fallback: if app didn't boot after 6 seconds (overwriting the loader), reload if online
      setTimeout(() => {
        const loader = document.getElementById('pwa-loader');
        // If the loader is still there, it means React hasn't replaced the content of #root
        if (loader && document.body.contains(loader) && navigator.onLine) {
           console.log('App failed to render, trying forced reload...');
           window.location.reload(true);
        }
      }, 6000);

      // Update loader text if offline
      window.addEventListener('load', () => {
        if (!navigator.onLine) {
          const p = document.querySelector('#pwa-loader p');
          if (p) p.textContent = 'Загрузка...';
          const p2 = document.querySelector('#pwa-loader p:nth-of-type(2)');
          if (p2) p2.textContent = 'Работаем в автономном режиме';
        }
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div id="pwa-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fffaf5; font-family: sans-serif; z-index: 9999;">
        <div style="width: 50px; height: 50px; border: 4px solid #fed7aa; border-top: 4px solid #fb923c; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <p style="color: #4b5563; font-weight: 600; font-size: 1.1rem; margin: 0;">Обновляемся...</p>
        <p style="color: #6b7280; font-size: 0.9rem; margin-top: 8px;">Ещё немножко и отобразим информацию</p>
        <style>
          @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
          #pwa-loader { animation: fadeIn 0.3s ease-out; }
          @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        </style>
      </div>
    </div>
    
    <!-- PWA Setup Script -->
    <script src="/pwa-setup.js?v=115"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
